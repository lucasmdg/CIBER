name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ciberseguridad/portfolio_v2/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify project structure
        run: ls -la ciberseguridad/portfolio_v2/package.json ciberseguridad/portfolio_v2/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ciberseguridad/portfolio_v2

      - name: Build static export
        run: npm run build
        working-directory: ciberseguridad/portfolio_v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ciberseguridad/portfolio_v2/out
          branch: gh-pages
          clean: true
