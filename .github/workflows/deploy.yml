name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ciberseguridad/portfolio_v2/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: ciberseguridad/portfolio_v2

      - name: Build static export
        run: npm run build
        working-directory: ciberseguridad/portfolio_v2

      - name: Add .nojekyll
        run: touch ciberseguridad/portfolio_v2/out/.nojekyll

      - name: Deploy to gh-pages
        run: |
          cd ciberseguridad/portfolio_v2/out
          git init
          git config user.name "lucasmdg"
          git config user.email "lucasmendez1492@outlook.com"
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/lucasmdg/CIBER.git HEAD:gh-pages
