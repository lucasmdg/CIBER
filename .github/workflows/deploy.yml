name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ciberseguridad/portfolio_v2/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug directory
        run: pwd && ls -la ciberseguridad/portfolio_v2/package.json

      - name: Install dependencies
        run: cd ciberseguridad/portfolio_v2 && npm install

      - name: Build
        run: cd ciberseguridad/portfolio_v2 && npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ciberseguridad/portfolio_v2/out
          branch: gh-pages
