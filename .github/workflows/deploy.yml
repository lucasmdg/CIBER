name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ciberseguridad/portfolio_v2/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build & Export
        shell: bash
        run: |
          cd ciberseguridad/portfolio_v2
          npm install 2>&1
          npm run build 2>&1

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ciberseguridad/portfolio_v2/out
          branch: gh-pages
