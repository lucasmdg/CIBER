<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatMap - Attack Surface Reconnaissance Mapper</title>
    <style>
        :root {
            --bg-color: #030303;
            --panel-bg: #0c0d12;
            --border-color: #1a1e28;
            --text-color: #f1f5f9;
            --text-dim: #64748b;
            --primary: #00f0ff; /* Recon Cyan */
            --primary-glow: rgba(0, 240, 255, 0.15);
            --danger: #ef4444; /* Vulnerability Red */
            --danger-glow: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b; /* Medium Risk Orange */
            --success: #10b981; /* Low Risk Green */
            --font-mono: 'JetBrains Mono', 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 999;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.3;
        }

        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            animation: pulse 2.5s infinite ease-in-out;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .recon-status {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--primary);
            border: 1px solid var(--primary);
            background: var(--primary-glow);
            padding: 2px 8px;
            border-radius: 3px;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex: 1;
            height: calc(100vh - 60px);
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0d0f17 0%, #030303 100%);
        }

        /* Topology Mapper View */
        .mapper-view {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .toolbar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(12, 13, 18, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn-scan {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-scan:hover {
            opacity: 0.9;
        }

        /* SVG Map Area */
        .map-area {
            flex: 1;
            position: relative;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 40%, rgba(0, 240, 255, 0.08) 50%, transparent 60%);
            pointer-events: none;
            display: none;
            z-index: 2;
        }

        .radar-sweep.animating {
            display: block;
            animation: sweep 3s linear infinite;
        }

        /* Dynamic SVG network nodes mapping */
        .network-node {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(12, 13, 18, 0.8);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            opacity: 0; /* Hidden before scan */
        }

        .network-node.visible {
            opacity: 1;
        }

        .network-node:hover, .network-node.active {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
            transform: scale(1.1);
        }

        .network-node.has-vuln {
            border-color: var(--danger);
            box-shadow: 0 0 8px var(--danger-glow);
        }

        /* Details Side Panel */
        .panel {
            background-color: rgba(12, 13, 18, 0.85);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(26, 28, 36, 0.2);
        }

        .panel-title {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .details-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .info-label {
            color: var(--text-dim);
        }

        .vuln-item {
            border-left: 2px solid var(--danger);
            background: rgba(239, 68, 68, 0.05);
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            margin-top: 8px;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        /* SVG overlay */
        .lines-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .net-line {
            stroke: rgba(0, 240, 255, 0.15);
            stroke-width: 1.5;
            display: none;
        }

        .net-line.visible {
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes sweep {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <h1>ThreatMap Console // Attack Surface Mapping</h1>
        </div>
        <div class="recon-status">RECONNAISSANCE ENGINE [READY]</div>
    </header>

    <main>
        <!-- LEFT: VISUAL RECON MAP -->
        <section class="mapper-view">
            <div class="toolbar">
                <span style="font-family: var(--font-mono); font-weight: bold;">MAPA DE TOPOLOGÍA EXTERNA</span>
                <button class="btn-scan" id="btn-scan" onclick="startScan()">Iniciar Escaneo Recon</button>
            </div>
            <div class="map-area" id="map-container">
                <div class="radar-sweep" id="sweep"></div>
                <svg class="lines-overlay" id="lines-svg">
                    <line id="line-1" class="net-line" x1="100" y1="200" x2="250" y2="100"></line>
                    <line id="line-2" class="net-line" x1="100" y1="200" x2="250" y2="300"></line>
                    <line id="line-3" class="net-line" x1="250" y1="100" x2="450" y2="100"></line>
                    <line id="line-4" class="net-line" x1="250" y1="300" x2="450" y2="300"></line>
                    <line id="line-5" class="net-line" x1="450" y1="100" x2="600" y2="200"></line>
                    <line id="line-6" class="net-line" x1="450" y1="300" x2="600" y2="200"></line>
                </svg>

                <!-- Nodes loaded by JS -->
            </div>
        </section>

        <!-- RIGHT: ASSET DETAILS PANEL -->
        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">DETALLES DEL ACTIVO</h2>
            </div>
            <div class="panel-content" id="details-content">
                <p style="color: var(--text-dim); text-align: center; margin-top: 50px;">
                    Pulse INICIAR ESCANEO RECON y seleccione un nodo de la topología para ver su análisis de superficie de ataque.
                </p>
            </div>
        </section>
    </main>

    <script>
        const assets = [
            { id: 1, host: "dominio-principal.com", ip: "198.51.100.12", type: "Internet/Gateway", icon: "🌐", x: 10, y: 45, openPorts: [80, 443], vulns: [], risk: "BAJO", color: "var(--success)" },
            { id: 2, host: "dns.dominio-principal.com", ip: "198.51.100.13", type: "DNS Server", icon: "⚙️", x: 35, y: 20, openPorts: [53], vulns: [], risk: "BAJO", color: "var(--success)" },
            { id: 3, host: "vpn.dominio-principal.com", ip: "198.51.100.20", type: "VPN Access Point", icon: "🛡️", x: 35, y: 70, openPorts: [443, 1194], vulns: ["CVE-2023-49103 - Versión vulnerable susceptible a bypass de auth"], risk: "CRÍTICO", color: "var(--danger)", hasVuln: true },
            { id: 4, host: "mail.dominio-principal.com", ip: "198.51.100.14", type: "Servidor de Correo", icon: "✉️", x: 65, y: 20, openPorts: [25, 465, 587], vulns: ["Falta cabeceras SPF/DMARC - Susceptible a spoofing de email"], risk: "MEDIO", color: "var(--warning)", hasVuln: true },
            { id: 5, host: "app.dominio-principal.com", ip: "198.51.100.15", type: "Aplicación Web (Producción)", icon: "💻", x: 65, y: 70, openPorts: [80, 443], vulns: ["Librería jQuery desactualizada con riesgo de XSS"], risk: "BAJO", color: "var(--success)" },
            { id: 6, host: "test-dev.dominio-principal.com", ip: "198.51.100.99", type: "Entorno Desarrollo (Expuesto)", icon: "🧪", x: 88, y: 45, openPorts: [22, 80, 8080], vulns: ["Puerto SSH expuesto con contraseñas débiles", "Consola administrativa sin autenticación en 8080"], risk: "ALTO", color: "var(--primary)", hasVuln: true }
        ];

        const mapContainer = document.getElementById('map-container');
        const sweep = document.getElementById('sweep');
        const btnScan = document.getElementById('btn-scan');
        const linesSvg = document.getElementById('lines-svg');
        const detailsContent = document.getElementById('details-content');

        // Dynamically add nodes
        function initNodes() {
            assets.forEach(asset => {
                const div = document.createElement('div');
                div.className = `network-node ${asset.hasVuln ? 'has-vuln' : ''}`;
                div.id = `node-${asset.id}`;
                div.style.left = `${asset.x}%`;
                div.style.top = `${asset.y}%`;
                div.innerHTML = asset.icon;
                div.onclick = () => selectNode(asset.id);
                mapContainer.appendChild(div);
            });
        }

        function startScan() {
            btnScan.setAttribute('disabled', 'true');
            btnScan.textContent = "Escaneando...";
            sweep.classList.add('animating');

            // Simulate sonar discovering nodes progressively
            let i = 0;
            const scanInterval = setInterval(() => {
                if (i < assets.length) {
                    const node = document.getElementById(`node-${assets[i].id}`);
                    node.classList.add('visible');
                    
                    // Show corresponding line in svg
                    const lines = document.querySelectorAll('.net-line');
                    if (lines[i]) lines[i].classList.add('visible');
                    i++;
                } else {
                    clearInterval(scanInterval);
                    sweep.classList.remove('animating');
                    btnScan.removeAttribute('disabled');
                    btnScan.textContent = "Volver a Escanear";
                }
            }, 500);
        }

        function selectNode(id) {
            document.querySelectorAll('.network-node').forEach(n => n.classList.remove('active'));
            const node = document.getElementById(`node-${id}`);
            node.classList.add('active');

            const asset = assets.find(a => a.id === id);

            let vulnHtml = "";
            if (asset.vulns.length > 0) {
                vulnHtml = `<div style="margin-top: 15px;">
                    <span class="info-label" style="color: var(--danger); font-weight: bold;">Vulnerabilidades Detectadas:</span>
                    ${asset.vulns.map(v => `<div class="vuln-item">${v}</div>`).join('')}
                </div>`;
            } else {
                vulnHtml = `<p style="color: var(--success); font-weight: bold; margin-top: 15px;">✓ Sin vulnerabilidades críticas identificadas.</p>`;
            }

            detailsContent.innerHTML = `
                <div class="details-card">
                    <div class="info-row">
                        <span class="info-label">Hostname:</span>
                        <span style="color: #fff; font-weight: bold;">${asset.host}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Dirección IP:</span>
                        <span style="color: var(--primary); font-weight: bold;">${asset.ip}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Tipo de Activo:</span>
                        <span>${asset.type}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Nivel de Riesgo:</span>
                        <span style="color: ${asset.color}; font-weight: bold;">${asset.risk}</span>
                    </div>
                    <div class="info-row" style="margin-top: 10px;">
                        <span class="info-label">Puertos Abiertos:</span>
                        <span style="color: #fff;">${asset.openPorts.join(', ')}</span>
                    </div>
                    
                    ${vulnHtml}
                </div>
            `;
        }

        // Init App
        initNodes();
    </script>
</body>
</html>
